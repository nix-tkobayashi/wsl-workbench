<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>WSL Workbench</title>
  <link rel="stylesheet" href="./style.css" />
  <link rel="stylesheet" href="../node_modules/@xterm/xterm/css/xterm.css" />
</head>
<body>
  <div id="toolbar">
    <img id="appIcon" src="./app-icon.ico" alt="" />
    <span class="title" id="workspaceName"></span>
    <nav id="menubar">
      <button class="menubtn" data-menu="0" data-i18n="menu.workspace">Workspace</button>
      <button class="menubtn" data-menu="1" data-i18n="menu.edit">Edit</button>
      <button class="menubtn" data-menu="2" data-i18n="menu.view">View</button>
      <button class="menubtn" data-menu="3" data-i18n="menu.language">Language</button>
      <button class="menubtn" data-menu="4" data-i18n="menu.help">Help</button>
    </nav>
    <button id="claudeBtn" data-i18n="toolbar.startClaude" data-i18n-title="toolbar.startClaudeTitle" title="Runs: claude --dangerously-skip-permissions (skips permission prompts)">Start Claude</button>
    <div id="winControls">
      <button id="winMin" class="winctl" aria-label="Minimize">&#xE921;</button>
      <button id="winMax" class="winctl" aria-label="Maximize">&#xE922;</button>
      <button id="winClose" class="winctl wctl-close" aria-label="Close">&#xE8BB;</button>
    </div>
  </div>
  <div id="layout">
    <aside id="treePane" tabindex="0">
      <div id="cwd" title=""><span id="cwdPath"></span><span id="gitBranch" class="hidden"></span></div>
      <div id="tree"></div>
    </aside>
    <div id="verticalResizer" class="resizer vertical" data-i18n-title="ui.dragToResize" title="Drag to resize"></div>
    <main id="rightPane">
      <section id="editorPane">
        <div id="editorBar">
          <div id="editorTabList"></div>
          <button id="wrapToggle" class="editor-toolbtn hidden" data-i18n="editor.wrap">Wrap</button>
          <button id="previewToggle" class="editor-toolbtn hidden" data-i18n="editor.preview">Preview</button>
        </div>
        <div id="findWidget" class="hidden">
          <div class="find-row">
            <button id="findToggleReplace" class="find-toggle find-expand" aria-expanded="false" data-i18n-title="find.toggleReplace" title="Toggle Replace">&#x203A;</button>
            <input id="findInput" type="text" spellcheck="false" autocomplete="off" data-i18n-placeholder="find.placeholder" placeholder="Find" />
            <button id="findCase" class="find-toggle" aria-pressed="false" data-i18n-title="find.caseSensitive" title="Match case">Aa</button>
            <span id="findCount" class="find-count"></span>
            <button id="findPrev" class="find-btn" data-i18n-title="find.previous" title="Previous">&#x2191;</button>
            <button id="findNext" class="find-btn" data-i18n-title="find.next" title="Next">&#x2193;</button>
            <button id="findClose" class="find-btn" data-i18n-title="find.close" title="Close">&#x2715;</button>
          </div>
          <div class="find-row find-replace-row">
            <input id="replaceInput" type="text" spellcheck="false" autocomplete="off" data-i18n-placeholder="find.replacePlaceholder" placeholder="Replace" />
            <button id="replaceOne" class="find-btn find-text-btn" data-i18n="find.replace" data-i18n-title="find.replace" title="Replace">Replace</button>
            <button id="replaceAll" class="find-btn find-text-btn" data-i18n="find.replaceAll" data-i18n-title="find.replaceAll" title="Replace All">All</button>
          </div>
        </div>
        <div id="editorScroll">
          <div id="editorGutter" aria-hidden="true"></div>
          <div id="editorMeasure" aria-hidden="true"></div>
          <div id="editorBackdrop" aria-hidden="true"></div>
          <textarea id="editor" spellcheck="false" data-i18n-placeholder="editor.placeholder" placeholder="Select a text file from the left tree."></textarea>
          <div id="editorPreview" class="hidden"></div>
        </div>
        <img id="imagePreview" alt="" />
      </section>
      <div id="horizontalResizer" class="resizer horizontal" data-i18n-title="ui.dragToResize" title="Drag to resize"></div>
      <section id="terminalPane">
        <div id="terminalTabs">
          <div id="terminalTabList"></div>
          <button id="newTerminalBtn" data-i18n-title="terminal.newTab" title="New Terminal">+</button>
        </div>
        <div id="terminalHost"></div>
      </section>
    </main>
  </div>
  <div id="contextMenu" class="context-menu hidden">
    <button data-action="new-file" data-i18n="ctx.newFile">New File</button>
    <button data-action="new-folder" data-i18n="ctx.newFolder">New Folder</button>
    <div class="menu-separator" id="ctxSepEdit"></div>
    <button data-action="rename" data-i18n="ctx.rename">Rename</button>
    <button data-action="delete" class="danger" data-i18n="ctx.delete">Delete</button>
    <div class="menu-separator"></div>
    <button data-action="reveal" data-i18n="ctx.reveal">Reveal in Explorer</button>
    <button data-action="open-new-window" data-i18n="ctx.openNewWindow">Open in New Window</button>
  </div>
  <div id="landing" class="landing">
    <div class="landing-box">
      <div class="landing-title">WSL Workbench</div>
      <div class="landing-subtitle" data-i18n="landing.subtitle">Open a workspace to get started</div>
      <div class="landing-actions">
        <button id="landingOpenWorkspace" class="primary" data-i18n="landing.openWorkspace">Open Workspace…</button>
        <button id="landingOpenFile" data-i18n="landing.openWorkspaceFile">Open Workspace File…</button>
        <button id="landingClone" data-i18n="landing.cloneRepo">Clone Repository…</button>
      </div>
      <div id="landingRecent" class="landing-recent hidden">
        <div class="landing-recent-title" data-i18n="landing.recent">Recent Workspaces</div>
        <div id="landingRecentList"></div>
      </div>
    </div>
  </div>
  <div id="updateModal" class="modal hidden">
    <div class="modal-box">
      <div class="modal-message" id="updateMessage"></div>
      <div id="updateBarTrack"><div id="updateBarFill"></div></div>
      <div id="updatePercent"></div>
    </div>
  </div>
  <div id="promptModal" class="modal hidden">
    <div class="modal-box">
      <div class="modal-message" id="promptMessage"></div>
      <input type="text" id="promptInput" spellcheck="false" autocomplete="off" />
      <div class="modal-actions">
        <button id="promptCancel" data-i18n="prompt.cancel">Cancel</button>
        <button id="promptOk" class="primary" data-i18n="prompt.ok">OK</button>
      </div>
    </div>
  </div>
  <script src="./i18n.js"></script>
  <script src="./file-types.js"></script>
  <script src="./markdown.js"></script>
  <script src="./terminal-actions.js"></script>
  <script src="../node_modules/@xterm/xterm/lib/xterm.js"></script>
  <script src="../node_modules/@xterm/addon-fit/lib/addon-fit.js"></script>
  <script src="./renderer.js"></script>
</body>
</html>
